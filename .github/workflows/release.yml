# =============================================================================
# Release — .github/workflows/release.yml
# Tag-based publish to GitHub Releases.
# Trigger: push tags matching v*  (e.g., v1.0.0, v2.1.3-alpha)
# Steps: build, extract CHANGELOG section, create release with JAR artifact.
# =============================================================================
name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  ORG_GRADLE_PROJECT_configurationCache: false

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Set up Gradle (cached)
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: >
          ./gradlew build
          --no-configuration-cache

      - name: Extract changelog section
        id: changelog
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"

          if [ -f CHANGELOG.md ]; then
            awk -v ver="${TAG_VERSION}" '
              $0 ~ "^## \\[" ver "\\]"  { found=1; next }
              found && $0 ~ "^## \\["   { exit }
              found                     { print }
            ' CHANGELOG.md > /tmp/release_body.md

            if [ -s /tmp/release_body.md ]; then
              echo "body_path=/tmp/release_body.md" >> "$GITHUB_OUTPUT"
            else
              echo "No changelog entry found for v${TAG_VERSION}, using generated notes."
            fi
          else
            echo "CHANGELOG.md not found, release notes will be auto-generated."
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PacketMenu ${{ github.ref_name }}
          body_path: ${{ steps.changelog.outputs.body_path || '' }}
          generate_release_notes: ${{ steps.changelog.outputs.body_path == '' }}
          files: |
            build/libs/PacketMenu-*.jar
          fail_on_unmatched_files: true
