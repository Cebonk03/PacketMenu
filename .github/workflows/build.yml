# =============================================================================
# Build & Matrix Test — .github/workflows/build.yml
# Runs on every push/PR to main.  Matrix: Java 21/25 × MC 1.21.4–26.1.2.
# Excludes invalid combos (Java 21 + MC 26.x).
# =============================================================================
name: Build

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  # Disable Gradle configuration cache (Gradle 9.x compat, ref plan Task 1)
  ORG_GRADLE_PROJECT_configurationCache: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        java: [21, 25]
        minecraft:
          - "1.21.4"
          - "1.21.7"
          - "1.21.11"
          - "26.1"
          - "26.1.2"
        # Exclude invalid combos: Java 21 cannot run MC 26.x
        exclude:
          - java: 21
            minecraft: "26.1"
          - java: 21
            minecraft: "26.1.2"
    runs-on: ubuntu-24.04
    continue-on-error: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }} (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin

      - name: Set up Gradle (cached)
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: >
          ./gradlew build
          --no-configuration-cache
          -PminecraftVersion=${{ matrix.minecraft }}

      - name: Checkstyle (main sources)
        run: >
          ./gradlew checkstyleMain
          --no-configuration-cache

      - name: SpotBugs (main sources)
        run: >
          ./gradlew spotbugsMain
          --no-configuration-cache

      - name: Test
        run: >
          ./gradlew test
          --no-configuration-cache

      - name: Archive JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PacketMenu-java${{ matrix.java }}-mc${{ matrix.minecraft }}
          path: build/libs/PacketMenu-*.jar
          if-no-files-found: error
